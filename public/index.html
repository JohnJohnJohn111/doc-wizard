<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMSW Shelf Company Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1B3A4B; --navy-mid: #2E5C7A; --navy-light: #EBF2F7;
      --gold: #B8963E; --gold-light: #FBF6EC;
      --ink: #1A1A1A; --ink-soft: #555555;
      --paper: #F8F7F4; --white: #FFFFFF; --border: #D8D8D0; --success: #2A6B4A;
      --context-bg: #F4F0E8; --context-border: #DDD8CC;
    }
    html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.65; }

    /* Header */
    .site-header { background: var(--navy); padding: 16px 40px; display: flex; align-items: center; }
    .site-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: white; letter-spacing: 0.06em; }
    .site-logo span { color: #AAC8E0; font-weight: 400; font-size: 1rem; margin-left: 10px; }

    /* Pages */
    .page { display: none; }
    .page.active { display: flex; }

    /* Landing */
    #landingPage { min-height: calc(100vh - 56px); align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 60px 24px; }
    .landing-inner { max-width: 560px; }
    .landing-crest { width: 72px; height: 72px; background: var(--navy); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; color: white; letter-spacing: 0.05em; }
    .landing-title { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 600; color: var(--navy); line-height: 1.2; margin-bottom: 20px; }
    .landing-text { font-size: 1rem; color: var(--ink-soft); margin-bottom: 40px; line-height: 1.7; }
    .btn-continue { background: var(--navy); color: white; border: none; padding: 16px 48px; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.04em; border-radius: 4px; cursor: pointer; transition: background 0.2s, transform 0.15s; }
    .btn-continue:hover { background: var(--navy-mid); transform: translateY(-1px); }

    /* Form page layout */
    #formPage { min-height: calc(100vh - 56px); flex-direction: row; }

    /* Left nav sidebar */
    .form-sidebar { width: 210px; flex-shrink: 0; background: var(--navy); padding: 28px 18px; display: flex; flex-direction: column; gap: 3px; overflow-y: auto; }
    .sidebar-label { font-size: 0.63rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: #6A9AB8; margin-bottom: 10px; }
    .nav-item { padding: 7px 11px; border-radius: 4px; font-size: 0.76rem; color: #8EB8D4; cursor: pointer; transition: all 0.15s; line-height: 1.35; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.12); color: white; font-weight: 500; }
    .nav-item.done { color: #7EC8A0; }
    .nav-item.done::before { content: "✓  "; }

    /* Centre scrollable area */
    .form-main { flex: 1; overflow-y: auto; padding: 40px 32px; display: flex; flex-direction: column; align-items: flex-start; }

    /* Two-column layout: card + context */
    .form-row { display: flex; gap: 24px; width: 100%; max-width: 1080px; align-items: flex-start; }

    /* Progress */
    .progress-wrap { width: 100%; max-width: 1080px; margin-bottom: 28px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--ink-soft); margin-bottom: 8px; }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--gold); transition: width 0.4s ease; }

    /* Question card */
    .q-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 36px 40px; flex: 1; min-width: 0; box-shadow: 0 2px 16px rgba(0,0,0,0.05); animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .q-number { font-size: 0.68rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 10px; }
    .q-label { font-family: 'Cormorant Garamond', serif; font-size: 1.55rem; font-weight: 500; color: var(--navy); line-height: 1.3; margin-bottom: 8px; }
    .q-hint { font-size: 0.82rem; color: var(--ink-soft); margin-bottom: 24px; font-style: italic; }
    .optional-badge { display: inline-block; margin-left: 10px; font-size: 0.65rem; background: #F0EDE6; padding: 2px 8px; border-radius: 3px; color: #888; font-family: 'Inter', sans-serif; vertical-align: middle; font-weight: 400; }

    /* Context panel */
    .context-panel { width: 300px; flex-shrink: 0; background: var(--context-bg); border: 1px solid var(--context-border); border-radius: 8px; padding: 24px 22px; animation: fadeUp 0.3s ease; }
    .context-panel.hidden { display: none; }
    .context-icon { font-size: 1.1rem; margin-bottom: 10px; }
    .context-title { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 10px; }
    .context-body { font-size: 0.82rem; color: #4A4030; line-height: 1.65; }
    .context-body p { margin-bottom: 10px; }
    .context-body p:last-child { margin-bottom: 0; }

    /* Inputs */
    input[type="text"], input[type="email"], textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.95rem; color: var(--ink); background: #FAFAFA; outline: none; transition: border-color 0.2s; resize: vertical; }
    input:focus, textarea:focus { border-color: var(--navy-mid); background: white; }
    textarea { min-height: 90px; }

    /* Checkboxes */
    .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .check-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 4px; cursor: pointer; transition: all 0.15s; font-size: 0.88rem; user-select: none; }
    .check-item:hover { border-color: var(--navy-mid); background: var(--navy-light); }
    .check-item.checked { border-color: var(--navy); background: var(--navy-light); color: var(--navy); font-weight: 500; }
    .check-box { width: 18px; height: 18px; border: 1.5px solid var(--border); border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.7rem; transition: all 0.15s; }
    .check-item.checked .check-box { background: var(--navy); border-color: var(--navy); color: white; }

    /* People cards */
    .person-card { border: 1.5px solid var(--border); border-radius: 6px; padding: 20px 22px; margin-bottom: 14px; background: #FAFAF8; position: relative; }
    .person-card-title { font-size: 0.76rem; font-weight: 600; color: var(--navy); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
    .person-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .person-field-label { font-size: 0.72rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 5px; display: block; }
    .person-field-wrap { display: flex; flex-direction: column; }
    .person-field-wrap.full { grid-column: 1 / -1; }
    .chairman-toggle { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: 0.85rem; cursor: pointer; color: var(--navy); user-select: none; }
    .chairman-toggle input { cursor: pointer; accent-color: var(--navy); width: 16px; height: 16px; }
    .remove-person { position: absolute; top: 14px; right: 14px; background: none; border: none; color: #AAAAAA; font-size: 1rem; cursor: pointer; padding: 4px; line-height: 1; transition: color 0.15s; }
    .remove-person:hover { color: #CC4444; }
    .add-person-btn { background: none; border: 1.5px dashed var(--border); border-radius: 4px; padding: 11px; width: 100%; font-family: 'Inter', sans-serif; font-size: 0.85rem; color: var(--navy-mid); cursor: pointer; transition: all 0.15s; margin-top: 4px; }
    .add-person-btn:hover { border-color: var(--navy-mid); background: var(--navy-light); }

    /* Nav buttons */
    .nav-buttons { display: flex; gap: 12px; margin-top: 28px; }
    .btn-primary { background: var(--navy); color: white; border: none; padding: 13px 30px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.15s; }
    .btn-primary:hover { background: var(--navy-mid); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-ghost { background: transparent; color: var(--ink-soft); border: 1.5px solid var(--border); padding: 12px 22px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
    .btn-ghost:hover { border-color: var(--ink-soft); color: var(--ink); }
    .error-msg { color: #B44040; background: #FFF0F0; border: 1px solid #FFCCCC; border-radius: 4px; padding: 10px 14px; font-size: 0.85rem; margin-top: 10px; }

    /* Success */
    .success-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 56px); padding: 48px; }
    .success-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 56px 48px; max-width: 500px; text-align: center; box-shadow: 0 4px 32px rgba(0,0,0,0.08); animation: fadeUp 0.3s ease; }
    .success-icon { width: 64px; height: 64px; background: #E8F5EE; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 24px; }
    .success-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; color: var(--navy); margin-bottom: 12px; }
    .success-card p { color: var(--ink-soft); margin-bottom: 28px; font-size: 0.95rem; }
    .btn-download { background: var(--success); color: white; border: none; padding: 16px 36px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s; display: inline-block; text-decoration: none; }
    .btn-download:hover { background: #1E5238; }
    .btn-restart { background: none; border: none; color: var(--ink-soft); font-family: 'Inter', sans-serif; font-size: 0.85rem; cursor: pointer; margin-top: 14px; text-decoration: underline; text-underline-offset: 3px; display: block; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 960px) {
      .form-row { flex-direction: column; max-width: 680px; }
      .context-panel { width: 100%; }
    }
    @media (max-width: 768px) {
      #formPage { flex-direction: column; }
      .form-sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 14px; gap: 5px; }
      .sidebar-label { width: 100%; }
      .nav-item { font-size: 0.7rem; padding: 5px 8px; }
      .form-main { padding: 20px 16px; }
      .q-card { padding: 24px 20px; }
      .check-grid { grid-template-columns: 1fr; }
      .person-fields { grid-template-columns: 1fr; }
      .person-field-wrap.full { grid-column: 1; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">CMSW <span>Shelf Company Generator</span></div>
</header>

<!-- Landing Page -->
<div id="landingPage" class="page active">
  <div class="landing-inner">
    <div class="landing-crest">CMSW</div>
    <h1 class="landing-title">Shelf Company Generator</h1>
    <p class="landing-text">Please proceed to our Shelf Company Generator form by clicking Continue.</p>
    <button class="btn-continue" onclick="showForm()">Continue</button>
  </div>
</div>

<!-- Form Page -->
<div id="formPage" class="page">
  <nav class="form-sidebar" id="formSidebar">
    <div class="sidebar-label">Questions</div>
  </nav>
  <main class="form-main" id="formMain"></main>
</div>

<!-- Success Page -->
<div id="successPage" class="page">
  <div class="success-wrap">
    <div class="success-card" id="successCard"></div>
  </div>
</div>

<script>
let flowData = null;
let answers = {};
let history = [];
let currentQ = null;

const NAV_LABELS = {
  q1: 'Entity name', q2: 'Address', q3: 'Accounting year',
  q4: 'Business activity', q5: 'Share capital', q6: 'Shareholder(s)',
  q7: 'E-mail', q8: 'Provisions', q9: 'Board members',
  q10: 'Deputy board members', q11: 'Managing director',
  q12: 'Authorized signatory', q13: 'Auditor'
};

// Context guidance for each question, sourced from CMSW guidance notes
const CONTEXT = {
  q1: {
    title: 'Guidance — Business Name',
    body: `<p>When choosing a company name, it is important to find a name that has not previously been registered or is too similar to a previously registered name.</p>
           <p>There are also certain other registration obstacles to consider, such as that the name may not infringe on trademarks, family names or other protected designations.</p>
           <p>In order to achieve distinctiveness it may be appropriate to use first and last names, place names and/or imaginary words in combination with words related to the business. Feel free to give several name suggestions.</p>`
  },
  q2: {
    title: 'Guidance — Address',
    body: `<p>The company's intended registered address.</p>`
  },
  q3: {
    title: 'Guidance — Accounting Year',
    body: `<p>The accounting year shall encompass twelve months. Companies within a group shall follow the same accounting year.</p>`
  },
  q4: {
    title: 'Guidance — Business Activity',
    body: `<p>The description of the business shall include information on the type of business, main industry and/or type of goods.</p>
           <p>The business shall be described in as much detail as possible.</p>`
  },
  q5: {
    title: 'Guidance — Share Capital',
    body: `<p>We recommend a share capital of SEK 25,000 distributed over 500 shares.</p>
           <p>If you wish the company to have a higher share capital, please let us know.</p>`
  },
  q6: {
    title: 'Guidance — Founder / Shareholder',
    body: `<p>Name the individual or legal entity who will establish the company.</p>
           <p>If the acquirer is a legal entity, please also name the authorized signatory.</p>`
  },
  q7: {
    title: 'Guidance — E-mail Address',
    body: `<p>Should you choose to list an e-mail address, you will automatically receive an e-mail from the Swedish Companies Registration Office each time an application for changes concerning the company is registered.</p>`
  },
  q8: {
    title: 'Guidance — Transfer Conditions & Share Certificates',
    body: `<p>The Swedish Companies Act allows for three different clauses: <strong>consent clause</strong>, <strong>pre-emption clause</strong> and <strong>right of first refusal clause</strong>.</p>
           <p><em>Consent</em> means shares may be transferred to a new owner only with the company's consent.</p>
           <p><em>Pre-emption</em> means a shareholder or another person shall be offered to purchase shares before they may be transferred.</p>
           <p><em>Right of first refusal</em> means a shareholder or another person shall have the right to redeem shares that have been transferred to a new owner. We generally recommend this clause as it can be drafted to also affect family acquisitions.</p>
           <p>Regarding share certificates: it is not mandatory to issue them. As stock certificates are documents of value, it may in many cases be suitable to waive issuance. A share register is, however, always drawn up.</p>`
  },
  q9: {
    title: 'Guidance — Board Members',
    body: `<p>A limited liability company shall have a board with one or more board members. Everyone on the board must be of legal age, free of bankruptcy and may not be under guardianship.</p>
           <p>At least half of the board members must be resident within the European Economic Area (EEA).</p>
           <p>In a board with more than one member, one of the board members shall be appointed <strong>Chairman</strong>. The Chairman shall organise the board's work and ensure the board fulfils its duties.</p>`
  },
  q10: {
    title: 'Guidance — Deputy Board Members',
    body: `<p>If the board is made up of one or two board members, a deputy board member shall be appointed.</p>
           <p>Deputy board members must also be resident within the EEA (counted separately from board members).</p>`
  },
  q11: {
    title: 'Guidance — Managing Director',
    body: `<p>A Managing Director may be appointed in a private company, but it is not mandatory.</p>
           <p>The Managing Director shall be of legal age, free of bankruptcy and may not be under guardianship. The Managing Director must also be resident within the EEA.</p>
           <p>The Managing Director has the right to sign on behalf of the company for day-to-day administrative matters. This right is granted by law and cannot be restricted by the board.</p>`
  },
  q12: {
    title: 'Guidance — Authorized Signatory',
    body: `<p>The board represents the company and legally signs for it. The board may decide on authority to sign on behalf of the company for one or more board members, the Managing Director or other persons, either separately or jointly.</p>
           <p>If a person outside the board shall have authority to sign, their name, date of birth and address shall be listed.</p>
           <p>At least one signatory must be resident within the EEA.</p>`
  },
  q13: {
    title: 'Guidance — Auditor',
    body: `<p>A limited liability company may have at least one certified or qualified auditor. If you wish to have an accounting firm as auditor, both the accounting firm and the principally responsible auditor shall be named.</p>
           <p><em>Note:</em> Small limited companies are exempted from the requirement of appointing an auditor. A small company has fewer than an average of 3 employees, a balance sheet total of less than SEK 1.5 million and net turnover of less than SEK 3 million.</p>
           <p>One or more deputy auditors may also be appointed, but this is not mandatory.</p>`
  }
};

async function init() {
  try {
    const res = await fetch('/api/flow');
    flowData = await res.json();
  } catch(e) {
    console.error('Failed to load flow', e);
  }
}

function showForm() {
  document.getElementById('landingPage').classList.remove('active');
  document.getElementById('formPage').classList.add('active');
  answers = {}; history = [];
  const flow = flowData.flows['shelf-company'];
  currentQ = flow.questions[flow.startQuestion];
  renderQuestion();
}

function updateSidebar() {
  const sidebar = document.getElementById('formSidebar');
  const flow = flowData.flows['shelf-company'];
  const qIds = Object.keys(flow.questions);
  const doneIds = history.map(q => q.id);
  const currentId = currentQ ? currentQ.id : null;
  sidebar.innerHTML = '<div class="sidebar-label">Questions</div>' +
    qIds.map(id => {
      const isDone = doneIds.includes(id);
      const isActive = id === currentId;
      return `<div class="nav-item ${isActive ? 'active' : ''} ${isDone && !isActive ? 'done' : ''}">${NAV_LABELS[id] || id}</div>`;
    }).join('');
}

function renderQuestion() {
  updateSidebar();
  const q = currentQ;
  const flow = flowData.flows['shelf-company'];
  const total = Object.keys(flow.questions).length;
  const current = history.length + 1;
  const pct = Math.round(((current - 1) / total) * 100);

  const main = document.getElementById('formMain');
  const isOptional = !q.required;
  const hintHtml = q.hint ? `<div class="q-hint">${q.hint}</div>` : '';

  let inputHtml = '';

  if (q.type === 'checkbox') {
    const checked = Array.isArray(answers[q.field]) ? answers[q.field] : [];
    inputHtml = `<div class="check-grid">` +
      q.options.map(opt => {
        const isChecked = checked.includes(opt);
        return `<div class="check-item ${isChecked ? 'checked' : ''}" onclick="toggleCheck('${opt.replace(/'/g, "\\'")}', this)">
          <div class="check-box">${isChecked ? '&#10003;' : ''}</div>${opt}</div>`;
      }).join('') + `</div>`;

  } else if (q.type === 'people') {
    const people = Array.isArray(answers[q.field]) ? answers[q.field] : [{}];
    answers[q.field] = people;
    inputHtml = `<div id="peopleList">` + people.map((p, i) => renderPersonCard(p, i, q)).join('') + `</div>
      <button class="add-person-btn" onclick="addPerson()">+ Add another person</button>`;

  } else if (q.type === 'textarea') {
    inputHtml = `<textarea id="mainInput" placeholder="${q.placeholder || ''}" oninput="answers['${q.field}']=this.value">${answers[q.field] || ''}</textarea>`;
  } else {
    inputHtml = `<input type="text" id="mainInput" placeholder="${q.placeholder || ''}" value="${answers[q.field] || ''}" oninput="answers['${q.field}']=this.value" onkeydown="if(event.key==='Enter')nextQ()">`;
    if (q.id === 'q1') {
      inputHtml += `
        <button type="button" id="controlNameBtn" onclick="controlName()"
          style="margin-top:12px; padding:9px 20px; background:var(--navy); color:white; border:none; border-radius:4px; font-family:'Inter',sans-serif; font-size:0.85rem; font-weight:500; letter-spacing:0.03em; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:background 0.2s;">
          <span>🔍</span> Control Name
        </button>
        <div id="nameControlPanel" style="display:none; margin-top:16px; border:1px solid var(--border); border-radius:6px; overflow:hidden; font-size:0.85rem; font-family:'Inter',sans-serif;">
          <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 16px; background:var(--navy-light); border-bottom:1px solid var(--border);">
            <span style="font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--navy);">Name Control — Swedish Company Register</span>
            <a id="nameControlLink" href="#" target="_blank" style="font-size:0.75rem; color:var(--navy-mid); text-decoration:none; white-space:nowrap;">Check manually on allabolag.se \u2197</a>
          </div>
          <div id="nameControlOverall" style="padding:10px 16px; font-weight:600; border-bottom:1px solid var(--border);"></div>
          <div id="nameControlList" style="padding:8px 16px 6px;"></div>
        </div>`;
    }
  }

  // Build context panel
  const ctx = CONTEXT[q.id];
  const contextHtml = ctx
    ? `<div class="context-panel">
        <div class="context-title">&#9432; ${ctx.title}</div>
        <div class="context-body">${ctx.body}</div>
       </div>`
    : `<div class="context-panel hidden"></div>`;

  main.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta"><span>Question ${current} of ${total}</span><span>${pct}% complete</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="form-row">
      <div class="q-card">
        <div class="q-number">Question ${current}</div>
        <div class="q-label">${q.label}${isOptional ? '<span class="optional-badge">Optional</span>' : ''}</div>
        ${hintHtml}
        ${inputHtml}
        <div id="errMsg"></div>
        <div class="nav-buttons">
          <button class="btn-ghost" onclick="${history.length > 0 ? 'prevQ()' : 'backToLanding()'}">&larr; Back</button>
          <button class="btn-primary" onclick="nextQ()">${q.next === null ? 'Generate Document &rarr;' : 'Next &rarr;'}</button>
        </div>
      </div>
      ${contextHtml}
    </div>`;

  const inp = document.getElementById('mainInput');
  if (inp) setTimeout(() => inp.focus(), 80);
}

function renderPersonCard(p, i, q) {
  const isChairman = p['Chairman'] === 'Yes';
  const fields = q.fields.filter(f => f !== 'Chairman');
  return `<div class="person-card" id="personCard_${i}">
    ${i > 0 ? `<button class="remove-person" onclick="removePerson(${i})" title="Remove">&#10005;</button>` : ''}
    <div class="person-card-title">Person ${i + 1}</div>
    <div class="person-fields">
      ${fields.map(f => {
        const isFull = f === 'Address';
        return `<div class="person-field-wrap ${isFull ? 'full' : ''}">
          <label class="person-field-label">${f}</label>
          <input type="text" value="${(p[f] || '').replace(/"/g, '&quot;')}" oninput="updatePerson(${i}, '${f.replace(/'/g, "\\'")}', this.value)" placeholder="">
        </div>`;
      }).join('')}
    </div>
    ${q.chairmanField ? `<label class="chairman-toggle">
      <input type="checkbox" ${isChairman ? 'checked' : ''} onchange="updatePerson(${i}, 'Chairman', this.checked ? 'Yes' : '')">
      Appoint as Chairman of the Board
    </label>` : ''}
  </div>`;
}

function updatePerson(idx, field, value) {
  const q = currentQ;
  if (!Array.isArray(answers[q.field])) answers[q.field] = [{}];
  if (!answers[q.field][idx]) answers[q.field][idx] = {};
  answers[q.field][idx][field] = value;
}

function addPerson() {
  const q = currentQ;
  if (!Array.isArray(answers[q.field])) answers[q.field] = [];
  answers[q.field].push({});
  const list = document.getElementById('peopleList');
  list.innerHTML = answers[q.field].map((p, i) => renderPersonCard(p, i, q)).join('');
}

function removePerson(idx) {
  const q = currentQ;
  answers[q.field].splice(idx, 1);
  const list = document.getElementById('peopleList');
  list.innerHTML = answers[q.field].map((p, i) => renderPersonCard(p, i, q)).join('');
}

function toggleCheck(opt, el) {
  const arr = Array.isArray(answers[currentQ.field]) ? answers[currentQ.field] : [];
  const idx = arr.indexOf(opt);
  if (idx === -1) arr.push(opt); else arr.splice(idx, 1);
  answers[currentQ.field] = arr;
  el.classList.toggle('checked');
  el.querySelector('.check-box').innerHTML = arr.includes(opt) ? '&#10003;' : '';
}

function prevQ() {
  if (history.length === 0) return;
  currentQ = history.pop();
  renderQuestion();
}

function backToLanding() {
  document.getElementById('formPage').classList.remove('active');
  document.getElementById('landingPage').classList.add('active');
}

function nextQ() {
  const q = currentQ;
  const val = answers[q.field];

  if (q.required && q.type !== 'checkbox' && q.type !== 'people') {
    if (!val || (typeof val === 'string' && !val.trim())) {
      document.getElementById('errMsg').innerHTML = '<div class="error-msg">This field is required. Please provide an answer before continuing.</div>';
      return;
    }
  }
  if (q.required && q.type === 'people') {
    const people = Array.isArray(val) ? val : [];
    const hasData = people.some(p => p['Full name'] && p['Full name'].trim());
    if (!hasData) {
      document.getElementById('errMsg').innerHTML = '<div class="error-msg">Please add at least one person with a full name.</div>';
      return;
    }
  }

  history.push(q);
  const flow = flowData.flows['shelf-company'];

  if (q.next) {
    currentQ = flow.questions[q.next];
    renderQuestion();
  } else {
    generateDoc();
  }
}

async function generateDoc() {
  document.getElementById('formPage').classList.remove('active');
  document.getElementById('successPage').classList.add('active');
  document.getElementById('successCard').innerHTML = `<div class="spinner"></div><p style="color:#888;font-size:0.95rem">Building your document&hellip;</p>`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers, templateId: 'shelf-company' })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Generation failed');

    document.getElementById('successCard').innerHTML = `
      <div class="success-icon">&#10003;</div>
      <h2>Document Ready</h2>
      <p>Your Shelf Company data sheet for <strong>${answers.entity_name || 'the company'}</strong> has been generated successfully.</p>
      <a href="${data.downloadUrl}" download><button class="btn-download">&#8595; Download Word Document</button></a>
      <button class="btn-restart" onclick="location.reload()">Generate another document</button>`;
  } catch(err) {
    document.getElementById('successCard').innerHTML = `
      <div class="error-msg" style="text-align:left">Error: ${err.message}</div>
      <button class="btn-ghost" style="margin-top:20px" onclick="location.reload()">Start over</button>`;
  }
}

async function controlName() {
  const inp = document.getElementById('mainInput');
  const companyName = inp ? inp.value.trim() : '';
  if (!companyName) { alert('Please enter a company name first.'); return; }

  const btn = document.getElementById('controlNameBtn');
  btn.innerHTML = '<span>\u23f3</span> Searching\u2026';
  btn.disabled = true;
  btn.style.opacity = '0.65';

  try {
    const res = await fetch('/api/control-name', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company_name: companyName })
    });
    const data = await res.json();

    if (data.error) { alert('Error: ' + data.error); return; }

    // Show panel and set manual search link
    document.getElementById('nameControlPanel').style.display = 'block';
    if (data.searchUrl) document.getElementById('nameControlLink').href = data.searchUrl;

    // Colour palette per risk level
    const palette = {
      high:    { bg: '#FEE2E2', color: '#991B1B', border: '#FECACA' },
      medium:  { bg: '#FEF3C7', color: '#92400E', border: '#FCD34D' },
      low:     { bg: '#DCFCE7', color: '#166534', border: '#86EFAC' },
      unknown: { bg: '#F1F5F9', color: '#475569', border: '#CBD5E1' }
    };
    const c = palette[data.overallLevel] || palette.unknown;
    const overallEl = document.getElementById('nameControlOverall');
    overallEl.style.cssText = `background:${c.bg}; color:${c.color}; border-bottom:1px solid ${c.border}; padding:10px 16px; font-weight:600; font-size:0.86rem;`;
    overallEl.textContent = data.overall;

    // Results list
    const listEl = document.getElementById('nameControlList');
    const rp = {
      high:   { bg: '#FEE2E2', color: '#DC2626' },
      medium: { bg: '#FEF3C7', color: '#D97706' },
      low:    { bg: '#DCFCE7', color: '#16A34A' }
    };

    if (!data.results || data.results.length === 0) {
      listEl.innerHTML = '<p style="color:#888; font-size:0.82rem; padding:8px 0 6px;">No similar companies found in automated search. Use the manual link above to verify.</p>';
    } else {
      listEl.innerHTML = data.results.map(r => {
        const rc = rp[r.risk] || rp.low;
        return `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #F0EDE6; gap:12px;">
          <div style="flex:1; min-width:0;">
            <a href="${r.url}" target="_blank" style="color:var(--navy-mid); font-size:0.84rem; text-decoration:none; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${r.name}</a>
            ${r.matchReason ? `<span style="font-size:0.73rem; color:#888; font-style:italic;">${r.matchReason}</span>` : ''}
          </div>
          <div style="display:flex; gap:7px; align-items:center; flex-shrink:0;">
            <span style="font-size:0.75rem; color:#888;">${r.similarity}% match</span>
            <span style="padding:2px 9px; border-radius:10px; font-size:0.7rem; font-weight:700; background:${rc.bg}; color:${rc.color};">${r.risk.toUpperCase()}</span>
          </div>
        </div>`;
      }).join('');
    }
  } catch (e) {
    alert('Request failed: ' + e.message);
  } finally {
    btn.innerHTML = '<span>🔍</span> Control Name';
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

init();
</script>
</body>
</html>
